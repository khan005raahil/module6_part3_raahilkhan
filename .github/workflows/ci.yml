name: Full CI-CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-push-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Convert GitHub owner to lowercase
        id: owner
        shell: bash
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-backend:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-backend:latest

      - name: Build and push transactions
        uses: docker/build-push-action@v6
        with:
          context: ./transactions
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-transactions:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-transactions:latest

      - name: Build and push student portfolio
        uses: docker/build-push-action@v6
        with:
          context: ./studentportfolio
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-studentportfolio:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/module_6_part3_raahilkhan-studentportfolio:latest

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tags in GitOps manifests
        shell: bash
        run: |
          OWNER="${{ steps.owner.outputs.name }}"
          SHA="${{ github.sha }}"

          sed -i -E \
            "s|image: ghcr.io/.*/module_6_part3_raahilkhan-backend:.*|image: ghcr.io/${OWNER}/module_6_part3_raahilkhan-backend:${SHA}|" \
            gitops/k8s/backend-deployment.yaml

          sed -i -E \
            "s|image: ghcr.io/.*/module_6_part3_raahilkhan-transactions:.*|image: ghcr.io/${OWNER}/module_6_part3_raahilkhan-transactions:${SHA}|" \
            gitops/k8s/transactions-deployment.yaml

          sed -i -E \
            "s|image: ghcr.io/.*/module_6_part3_raahilkhan-studentportfolio:.*|image: ghcr.io/${OWNER}/module_6_part3_raahilkhan-studentportfolio:${SHA}|" \
            gitops/k8s/studentportfolio-deployment.yaml

      - name: Commit updated deployment artifacts
        working-directory: gitops
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add k8s/

          if git diff --cached --quiet; then
            echo "No deployment manifest changes detected."
          else
            git commit -m "Update images to ${{ github.sha }}"
            git push origin main
          fi